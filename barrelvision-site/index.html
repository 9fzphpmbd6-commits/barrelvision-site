  const [loading, setLoading] = useState(true);
  const [market, setMarket] = useState('');
  const [team, setTeam] = useState('');
  const [minEdge, setMinEdge] = useState('');
  const [minEdgeSlider, setMinEdgeSlider] = useState(0);
  const [teams, setTeams] = useState([]);
  // Feature 7: Pick Builder state
  const [picks, setPicks] = useState([]);
  const [leans, setLeans] = useState({}); // { propIndex: 'over' | 'under' }

  useEffect(() => { api('/teams').then(setTeams).catch(() => {}); }, []);

  // Sync slider and input
  const handleSliderChange = (val) => {
    setMinEdgeSlider(val);
    setMinEdge(val > 0 ? String(val) : '');
  };
  const handleInputChange = (val) => {
    setMinEdge(val);
    const num = parseFloat(val);
    if (!isNaN(num) && num >= 0 && num <= 1) setMinEdgeSlider(num);
    else if (val === '') setMinEdgeSlider(0);
  };

  useEffect(() => {
    setLoading(true);
    const qs = new URLSearchParams({
      ...(market && { market }),
      ...(team && { team }),
      ...(minEdge && { min_edge: minEdge })
    });
    api(`/props/today?${qs}`).then(d => { setData(d || []); setLoading(false); }).catch(() => { setData([]); setLoading(false); });
  }, [market, team, minEdge]);

  const marketPills = [
    { value: '', label: 'All' },
    { value: 'Hits', label: 'Hits' },
    { value: 'Total Bases', label: 'Total Bases' },
    { value: 'Home Runs', label: 'Home Runs' },
    { value: 'Strikeouts', label: 'Strikeouts' },
    { value: 'RBIs', label: 'RBIs' }
  ];

  // Helper for implied probability from American odds
  function impliedProb(odds) {
    if (odds == null) return null;
    const o = typeof odds === 'string' ? parseInt(odds) : odds;
    if (isNaN(o)) return null;
    if (o > 0) return (100 / (o + 100)) * 100;
    if (o < 0) return (Math.abs(o) / (Math.abs(o) + 100)) * 100;
    return null;
  }

  return h('div', { className: 'space-y-4 fade-in' },
    h('h1', { className: 'text-[18px] font-bold text-text', 'data-tour': 'props-table' }, "Today's Props"),

    // Market pill buttons
    h('div', { className: 'flex flex-wrap gap-1.5' },
      ...marketPills.map(mp => h('button', {
        key: mp.value,
        className: `pill-btn px-3 py-1.5 text-[12px] rounded-full font-medium ${market === mp.value ? 'bg-blue text-white' : 'bg-surface-2 text-text-muted border border-border'}`,
        onClick: () => setMarket(mp.value)
      }, mp.label))
    ),

    // Other filters
    h('div', { className: 'flex flex-wrap gap-2 items-center' },
      h('select', {
        className: 'bg-surface-2 border border-border rounded-md px-2 py-1.5 text-[13px] text-text outline-none',
        value: team, onChange: e => setTeam(e.target.value)
      },
        h('option', { value: '' }, 'All Teams'),
        ...teams.map(t => h('option', { key: t, value: t }, t))
      ),
      h('div', { className: 'flex items-center gap-2' },
        h('span', { className: 'text-[11px] text-text-faint' }, 'Min Edge:'),
        h('input', {
          type: 'number', step: '0.05', placeholder: '0',
          className: 'bg-surface-2 border border-border rounded-md px-2 py-1 text-[13px] text-text outline-none w-16 tabular-nums',
          value: minEdge, onChange: e => handleInputChange(e.target.value)
        }),
        h('input', {
          type: 'range', min: 0, max: 1, step: 0.05,
          value: minEdgeSlider,
          onChange: e => handleSliderChange(parseFloat(e.target.value)),
          className: 'w-24'
        }),
        h('span', { className: 'text-[11px] text-text-faint tabular-nums w-8' }, minEdgeSlider.toFixed(2))
      )
    ),

    // Table
    loading ? h(TableSkeleton, { rows: 10 }) :
    data.length === 0
      ? h('div', { className: 'bg-surface rounded-lg border border-border p-8 text-center text-text-faint text-[13px]' }, 'No props available for today.')
      : h('div', { className: 'bg-surface rounded-lg border border-border overflow-x-auto' },
          h('table', { className: 'data-table w-full text-[12px]' },
            h('thead', null,
              h('tr', { className: 'border-b border-border' },
                ...['', 'Player', 'Team', 'Market', 'Line', 'Over', 'Under', 'Impl. O%', 'Impl. U%', 'Book', 'Projected', 'Edge'].map(c =>
                  h('th', { key: c || 'add', className: 'px-3 py-2.5 text-right font-semibold text-text-muted' }, c)
                )
              )
            ),
            h('tbody', null,
              ...data.map((p, i) => {
                const implOver = impliedProb(p.odds_over);
                const implUnder = impliedProb(p.odds_under);
                return h('tr', {
                  key: i,
                  className: 'border-b border-border/50',
                  onClick: () => navigate(`/hitters/${p.batter_id}`)
                },
                  h('td', { className: 'px-2 py-2 text-center', onClick: e => e.stopPropagation() },
                    picks.find(pk => pk._idx === i)
                      ? h('button', {
                          className: 'w-6 h-6 rounded-full bg-red-dim text-red text-[11px] font-bold hover:bg-red/20',
                          onClick: () => setPicks(picks.filter(pk => pk._idx !== i))
                        }, '\u2212')
                      : h('button', {
                          className: 'w-6 h-6 rounded-full bg-blue-dim text-blue text-[11px] font-bold hover:bg-blue/20 disabled:opacity-30',
                          disabled: picks.length >= 5,
                          onClick: () => setPicks([...picks, { ...p, _idx: i }])
                        }, '+')
                  ),
                  h('td', { className: 'px-3 py-2 text-right font-medium text-text' }, p.full_name),
                  h('td', { className: 'px-3 py-2 text-right text-text-muted' }, p.team),
                  h('td', { className: 'px-3 py-2 text-right capitalize text-text' }, (p.market || '').replace(/_/g, ' ')),
                  h('td', { className: 'px-3 py-2 text-right tabular-nums font-medium' }, p.line),
                  h('td', { className: 'px-3 py-2 text-right tabular-nums' }, p.odds_over),
                  h('td', { className: 'px-3 py-2 text-right tabular-nums' }, p.odds_under),
                  h('td', { className: 'px-3 py-2 text-right tabular-nums text-text-muted' }, implOver != null ? implOver.toFixed(1) + '%' : '—'),
                  h('td', { className: 'px-3 py-2 text-right tabular-nums text-text-muted' }, implUnder != null ? implUnder.toFixed(1) + '%' : '—'),
                  h('td', { className: 'px-3 py-2 text-right text-text-muted' }, p.sportsbook || '—'),
                  h('td', { className: 'px-3 py-2 text-right tabular-nums' }, p.projected_value != null ? p.projected_value.toFixed(2) : '—'),
                  h('td', { className: 'px-3 py-2 text-right' },
                    h(EdgeChip, { edge: p.edge })
                  )
                );
              })
            )
          )
        ),

    // Feature 7: Pick Builder Panel
    picks.length > 0 && h('div', { className: 'bg-surface rounded-lg border border-border-accent p-4' },
      h('div', { className: 'flex items-center justify-between mb-3' },
        h('h3', { className: 'text-[14px] font-semibold text-text flex items-center gap-2' },
          '\uD83D\uDCCB Pick Builder',
          h('span', { className: 'text-[11px] text-text-muted font-normal' }, `(${picks.length}/5)`)
        ),
        h('button', {
          className: 'text-[11px] text-text-faint hover:text-text',
          onClick: () => { setPicks([]); setLeans({}); }
        }, 'Clear All')
      ),
      // Picks list
      h('div', { className: 'space-y-2 mb-3' },
        ...picks.map((pk, pi) => {
          const lean = leans[pk._idx];
          return h('div', { key: pi, className: 'flex items-center gap-2 bg-surface-2 rounded-lg p-2' },
            h('div', { className: 'flex-1 min-w-0' },
              h('div', { className: 'text-[12px] font-medium text-text truncate' }, pk.full_name),
              h('div', { className: 'text-[11px] text-text-muted' },
                (pk.market || '').replace(/_/g, ' '), ' | Line: ', pk.line
              )
            ),
            // Over/Under lean buttons
            h('div', { className: 'flex items-center gap-1' },
              h('button', {
                className: `px-2 py-0.5 text-[10px] rounded font-medium transition-colors ${lean === 'over' ? 'bg-green text-white' : 'bg-surface-3 text-text-muted border border-border hover:text-text'}`,
                onClick: () => setLeans({ ...leans, [pk._idx]: lean === 'over' ? null : 'over' })
              }, 'Over'),
              h('button', {
                className: `px-2 py-0.5 text-[10px] rounded font-medium transition-colors ${lean === 'under' ? 'bg-red text-white' : 'bg-surface-3 text-text-muted border border-border hover:text-text'}`,
                onClick: () => setLeans({ ...leans, [pk._idx]: lean === 'under' ? null : 'under' })
              }, 'Under')
            ),
            h('button', {
              className: 'text-text-faint hover:text-red text-[14px]',
              onClick: () => { setPicks(picks.filter((_, i) => i !== pi)); }
            }, '\u2715')
          );
        })
      ),
      // Combined probabilities
      (() => {
        const impliedProbs = picks.map(pk => {
          const odds = typeof pk.odds_over === 'string' ? parseInt(pk.odds_over) : pk.odds_over;
          if (odds == null || isNaN(odds)) return 0.5;
          if (odds > 0) return 100 / (odds + 100);
          if (odds < 0) return Math.abs(odds) / (Math.abs(odds) + 100);
          return 0.5;
        });
        const combinedImplied = impliedProbs.reduce((a, b) => a * b, 1);
        const modelProbs = picks.map(pk => {
          if (pk.projected_value != null && pk.line != null) {
            return pk.projected_value > pk.line ? 0.6 : 0.4;
          }
          return 0.5;
        });
        const combinedModel = modelProbs.reduce((a, b) => a * b, 1);
        // Spiciness: more legs + lower prob = spicier
        const spiciness = Math.min(10, Math.round(picks.length * 2 + (1 - combinedImplied) * 5));
        const spiceEmojis = '\uD83C\uDF36\uFE0F'.repeat(Math.min(5, Math.ceil(spiciness / 2)));

        return h('div', { className: 'grid grid-cols-3 gap-3' },
          h('div', { className: 'bg-surface-2 rounded-lg p-2 text-center' },
            h('div', { className: 'text-[10px] text-text-faint' }, 'Combined Implied'),
            h('div', { className: 'text-[14px] font-bold text-text tabular-nums' }, (combinedImplied * 100).toFixed(1) + '%')
          ),
          h('div', { className: 'bg-surface-2 rounded-lg p-2 text-center' },
            h('div', { className: 'text-[10px] text-text-faint' }, 'Model Probability'),
            h('div', { className: 'text-[14px] font-bold text-blue tabular-nums' }, (combinedModel * 100).toFixed(1) + '%')
          ),
          h('div', { className: 'bg-surface-2 rounded-lg p-2 text-center' },
            h('div', { className: 'text-[10px] text-text-faint' }, 'Spiciness'),
            h('div', { className: 'text-[14px]' }, spiceEmojis, h('span', { className: 'text-text-muted text-[11px] ml-1' }, `${spiciness}/10`))
          )
        );
      })()
    )
  );
}

// ─── About Page ─────────────────────────────────────
function AboutPage() {
  return h('div', { className: 'max-w-3xl mx-auto space-y-6 fade-in' },
    h('h1', { className: 'text-[20px] font-bold text-text' }, 'About BarrelVision'),

    h(AboutSection, { title: 'What is Statcast?', content: 'Statcast is MLB\'s tracking technology that captures ball and player movement data at extremely high resolution. It records exit velocity, launch angle, sprint speed, and more for every pitch and batted ball.' }),

    h(AboutSection, { title: 'Key Metrics', content: null },
      h('dl', { className: 'space-y-2' },
        ...([
          ['Exit Velocity (EV)', 'The speed of the ball off the bat, measured in mph. Higher EV correlates strongly with better outcomes — the league average is around 88 mph.'],
          ['Launch Angle (LA)', 'The vertical angle at which the ball leaves the bat. The "sweet spot" range is 8-32 degrees, where line drives and fly balls produce the best results.'],
          ['Barrel Rate', 'The percentage of batted ball events that are "barreled" — the ideal combination of exit velocity (≥98 mph) and launch angle (26-30° at 98 mph, wider range at higher EV). Barrels produce a batting average of .822 and a 1.375 slugging percentage.'],
          ['Hard Hit Rate', 'Percentage of batted balls with exit velocity ≥ 95 mph. A proxy for consistent hard contact.'],
          ['xwOBA (Expected Weighted On-Base Average)', 'A metric that uses exit velocity and launch angle to estimate the expected value of each batted ball event, removing luck and defense. The best single predictor of future offensive performance.'],
          ['xBA / xSLG', 'Expected batting average and slugging based on quality of contact, independent of actual outcomes.'],
          ['Sweet Spot Rate', 'Percentage of batted balls in the 8-32° launch angle range. Higher sweet spot rates indicate better bat-to-ball approach.']
        ]).map(([term, def]) =>
          h(Fragment, { key: term },
            h('dt', { className: 'text-[13px] font-semibold text-blue' }, term),
            h('dd', { className: 'text-[13px] text-text-muted leading-relaxed ml-0' }, def)
          )
        )
      )
    ),

    h(AboutSection, { title: 'Projections Model', content: 'Our projection system uses a combination of season-level Statcast metrics (exit velocity, barrel rate, hard hit rate, sweet spot rate) and situational splits to estimate expected outcomes for each game. The model weights recent performance more heavily and adjusts for opposing pitcher handedness and park factors.' }),

    h('div', { className: 'bg-surface rounded-lg border border-border-accent p-4' },
      h('h3', { className: 'text-[14px] font-semibold text-orange mb-2' }, 'Disclaimer'),
      h('p', { className: 'text-[13px] text-text-muted leading-relaxed' }, 'BarrelVision is for entertainment and informational purposes only. It is not intended as betting advice. Always gamble responsibly. Projections are estimates based on historical data and statistical models — they are not guarantees of future performance.')
    ),

    h(AboutSection, { title: 'Data Sources', content: 'All Statcast data is sourced from MLB Statcast via Baseball Savant. Player headshots courtesy of MLB. Prop lines and odds are sourced from publicly available sportsbook data.' })
  );
}

function AboutSection({ title, content, children }) {
  return h('div', { className: 'bg-surface rounded-lg border border-border p-4' },
    h('h2', { className: 'text-[15px] font-semibold text-text mb-2' }, title),
    content && h('p', { className: 'text-[13px] text-text-muted leading-relaxed' }, content),
    children
  );
}

// ─── Footer ─────────────────────────────────────────
function Footer() {
  return h('footer', { className: 'border-t border-border py-4 px-4 mt-auto' },
    h('div', { className: 'max-w-[1400px] mx-auto flex flex-col sm:flex-row items-center justify-between gap-2 text-[11px] text-text-faint' },
      h('span', null, '© 2026 BarrelVision — MLB Statcast Analytics'),
      h('div', { className: 'flex items-center gap-3' },
        h('span', null, 'Data: Baseball Savant'),
        h('a', { href: 'https://www.perplexity.ai/computer', target: '_blank', rel: 'noopener noreferrer', className: 'hover:text-text-muted transition-colors' }, 'Created with Perplexity Computer')
      )
    )
  );
}

// ─── Router ─────────────────────────────────────────
function Router({ compareIds, setCompareIds }) {
  const [hash, setHash] = useState(getHash());

  useEffect(() => {
    const fn = () => setHash(getHash());
    window.addEventListener('hashchange', fn);
    return () => window.removeEventListener('hashchange', fn);
  }, []);

  // Parse route
  const match = (pattern) => {
    const parts = pattern.split('/').filter(Boolean);
    const hashParts = hash.split('/').filter(Boolean);
    if (parts.length !== hashParts.length) return null;
    const params = {};
    for (let i = 0; i < parts.length; i++) {
      if (parts[i].startsWith(':')) params[parts[i].slice(1)] = hashParts[i];
      else if (parts[i] !== hashParts[i]) return null;
    }
    return params;
  };

  let page;
  const detailMatch = match('/hitters/:id');

  if (hash === '/' || hash === '') page = h(DashboardPage);
  else if (hash === '/hitters') page = h(HittersPage, { compareIds, setCompareIds });
  else if (detailMatch) page = h(HitterDetailPage, { id: detailMatch.id });
  else if (hash === '/props') page = h(PropsPage);
  else if (hash === '/compare') page = h(ComparePage, { compareIds });
  else if (hash === '/about') page = h(AboutPage);
  else page = h('div', { className: 'text-center py-20 text-text-muted' }, '404 \u2014 Page not found');

  return page;
}

// ─── App ────────────────────────────────────────────
function App() {
  const [compareIds, setCompareIds] = useState([]);
  const [tourActive, setTourActive] = useState(false);

  return h('div', { className: 'h-screen flex flex-col' },
    h(Navbar, { onTourStart: () => setTourActive(true), compareCount: compareIds.length }),
    h('main', { className: 'flex-1 overflow-y-auto overflow-x-hidden', style: { overscrollBehavior: 'contain' } },
      h('div', { className: 'max-w-[1400px] mx-auto px-4 py-4' },
        h(Router, { compareIds, setCompareIds })
      ),
      h(Footer)
    ),
    h(GuidedTour, { active: tourActive, onClose: () => setTourActive(false) })
  );
}

// ─── Mount ──────────────────────────────────────────
const root = createRoot(document.getElementById('root'));
root.render(h(App));

</script>
</body>
