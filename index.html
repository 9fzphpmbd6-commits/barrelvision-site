<style>
/* ========== RESET & BASE ========== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  overflow-y: auto;
  scroll-behavior: smooth;
  background: #0c1220;
  color: #f1f5f9;
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
a { color: inherit; text-decoration: none; }

/* ========== VARIABLES ========== */
:root {
  --bg: #0c1220;
  --surface: #141c2e;
  --card: #1a2439;
  --card-border: rgba(255,255,255,0.06);
  --red: #ef4444;
  --blue: #38bdf8;
  --green: #22c55e;
  --amber: #f59e0b;
  --text: #f1f5f9;
  --muted: #94a3b8;
  --faint: #64748b;
  --transition: 0.18s cubic-bezier(0.16,1,0.3,1);
}

/* ========== UTILITY ========== */
.tabular { font-variant-numeric: tabular-nums; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

/* ========== ANIMATIONS ========== */
@keyframes pulse-dot {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.4; transform: scale(1.6); }
}
@keyframes ticker-scroll {
  0% { transform: translateX(0); }
  100% { transform: translateX(-50%); }
}
@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* ========== SECTION SPACING ========== */
section { padding: 48px 0; }
section + section { padding-top: 0; }
.section-gap { margin-top: 56px; }

/* ========== NAVBAR ========== */
.navbar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(12,18,32,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--card-border);
  padding: 0 24px;
  height: 56px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.navbar-inner {
  max-width: 1200px;
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.navbar-logo {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: 2px;
  text-transform: uppercase;
  cursor: pointer;
  transition: color var(--transition);
}
.navbar-logo:hover { color: var(--red); }
.navbar-logo span { color: var(--red); }
.navbar-links {
  display: flex;
  align-items: center;
  gap: 8px;
}
.nav-link {
  font-size: 13px;
  font-weight: 600;
  padding: 8px 14px;
  border-radius: 6px;
  cursor: pointer;
  transition: background var(--transition), color var(--transition);
  color: var(--muted);
  text-decoration: none;
  position: relative;
}
.nav-link:hover { background: rgba(255,255,255,0.06); color: var(--text); }
.nav-link.active { color: var(--text); background: rgba(255,255,255,0.04); }
.nav-dropdown {
  position: relative;
}
.nav-dropdown-menu {
  position: absolute;
  top: 100%;
  right: 0;
  margin-top: 4px;
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  padding: 6px 0;
  min-width: 200px;
  box-shadow: 0 12px 32px rgba(0,0,0,0.5);
  z-index: 200;
}
.nav-dropdown-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 16px;
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  cursor: pointer;
  transition: background var(--transition), color var(--transition);
}
.nav-dropdown-item:hover {
  background: rgba(255,255,255,0.06);
  color: var(--text);
}
.hamburger {
  display: none;
  background: none;
  border: none;
  color: var(--text);
  font-size: 24px;
  cursor: pointer;
  padding: 4px;
}
.mobile-menu {
  display: none;
  position: fixed;
  top: 56px;
  left: 0;
  right: 0;
  bottom: 0;
  background: rgba(12,18,32,0.98);
  backdrop-filter: blur(12px);
  z-index: 99;
  padding: 24px;
  flex-direction: column;
  gap: 8px;
  overflow-y: auto;
}
.mobile-menu.open { display: flex; }
.mobile-menu-link {
  font-size: 16px;
  font-weight: 600;
  padding: 12px 16px;
  border-radius: 8px;
  color: var(--muted);
  cursor: pointer;
  transition: background var(--transition), color var(--transition);
}
.mobile-menu-link:hover { background: rgba(255,255,255,0.06); color: var(--text); }
.mobile-divider {
  height: 1px;
  background: var(--card-border);
  margin: 8px 0;
}
.mobile-section-label {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--faint);
  padding: 8px 16px 4px;
}

/* ========== 1. HERO ========== */
.hero {
  position: relative;
  overflow: hidden;
  padding: 64px 0 48px;
  background: var(--bg);
}
.hero::before {
  content: '';
  position: absolute;
  inset: 0;
  background:
    repeating-linear-gradient(
      -45deg,
      transparent,
      transparent 60px,
      rgba(239,68,68,0.03) 60px,
      rgba(239,68,68,0.03) 61px
    );
  pointer-events: none;
}
.hero-content {
  position: relative;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}
.hero-crosshair { width: 44px; height: 44px; }
.hero-title {
  font-size: 52px;
  font-weight: 800;
  letter-spacing: 3px;
  text-transform: uppercase;
  line-height: 1.1;
}
.hero-title span { color: var(--red); }
.hero-tagline {
  font-size: 16px;
  color: var(--blue);
  font-style: italic;
  font-weight: 400;
}
.hero-manifesto {
  max-width: 600px;
  font-size: 15px;
  line-height: 1.6;
  color: var(--muted);
  margin-top: 4px;
}
.hero-manifesto strong {
  color: #f1f5f9;
  font-weight: 600;
}
.hero-kpis {
  display: flex;
  gap: 24px;
  margin-top: 8px;
  flex-wrap: wrap;
  justify-content: center;
}
.hero-kpi {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}
.hero-kpi-value {
  font-size: 22px;
  font-weight: 800;
  color: var(--blue);
  font-variant-numeric: tabular-nums lining-nums;
}
.hero-kpi-label {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  color: var(--muted);
  font-weight: 500;
}
.hero-tip-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
  padding: 10px 28px;
  background: transparent;
  border: 2px solid var(--red);
  border-radius: 999px;
  color: #f1f5f9;
  font-size: 14px;
  font-weight: 700;
  font-family: inherit;
  cursor: pointer;
  transition: all 0.18s cubic-bezier(0.16,1,0.3,1);
  text-decoration: none;
}
.hero-tip-btn:hover {
  background: var(--red);
  color: #fff;
  transform: scale(1.04);
}
.hero-tip-subtext {
  font-size: 12px;
  color: var(--faint);
  font-style: italic;
  margin-top: -2px;
}

/* ========== 2. TICKER ========== */
.ticker-bar {
  background: var(--surface);
  border-top: 1px solid rgba(239,68,68,0.3);
  border-bottom: 1px solid rgba(239,68,68,0.3);
  overflow: hidden;
  position: relative;
  height: 44px;
  display: flex;
  align-items: center;
}
.ticker-edge-dot {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 8px; height: 8px;
  background: var(--red);
  border-radius: 50%;
  z-index: 2;
}
.ticker-edge-dot.left { left: 12px; }
.ticker-edge-dot.right { right: 12px; }
.ticker-track {
  display: flex;
  white-space: nowrap;
  animation: ticker-scroll 40s linear infinite;
}
.ticker-track span {
  font-size: 13px;
  font-weight: 500;
  color: var(--muted);
  padding: 0 32px;
  flex-shrink: 0;
}
.ticker-track .ticker-highlight { color: var(--text); font-weight: 600; }
.ticker-track .ticker-red { color: var(--red); }

/* ========== 3. LIVE GAMES ========== */
.live-games { padding-top: 48px; }
.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 24px;
}
.section-title {
  font-size: 22px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1.5px;
}
.live-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(239,68,68,0.15);
  color: var(--red);
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  padding: 4px 10px;
  border-radius: 4px;
}
.pulse-dot {
  width: 8px; height: 8px;
  background: var(--red);
  border-radius: 50%;
  animation: pulse-dot 1.5s ease-in-out infinite;
}
.games-scroll-wrapper {
  position: relative;
}
.games-scroll {
  display: flex;
  gap: 16px;
  overflow-x: auto;
  scroll-snap-type: x mandatory;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 8px;
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}
.games-scroll::-webkit-scrollbar { height: 4px; }
.games-scroll::-webkit-scrollbar-track { background: transparent; }
.games-scroll::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
.game-card {
  flex-shrink: 0;
  width: 220px;
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  overflow: hidden;
  scroll-snap-align: start;
  transition: transform var(--transition), border-color var(--transition);
}
.game-card:hover {
  transform: translateY(-2px);
  border-color: rgba(255,255,255,0.12);
}
.game-card-bar { height: 3px; width: 100%; }
.game-card-bar.live { background: var(--red); }
.game-card-bar.final { background: var(--muted); }
.game-card-bar.upcoming { background: var(--blue); opacity: 0.4; }
.game-card-body { padding: 12px 14px 10px; }
.game-team-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 0;
}
.game-team-logo {
  width: 28px; height: 28px;
  object-fit: contain;
  flex-shrink: 0;
}
.game-team-abbr {
  font-size: 14px;
  font-weight: 700;
  flex: 1;
  letter-spacing: 0.5px;
}
.game-team-score {
  font-size: 18px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  min-width: 24px;
  text-align: right;
}
.game-team-score.winner { color: var(--text); }
.game-team-score.loser { color: var(--muted); }
.game-status {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid var(--card-border);
}
.game-inning {
  font-size: 12px;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
}
.game-inning.live { color: var(--red); }
.game-inning.final { color: var(--muted); }
.game-inning.upcoming { color: var(--blue); }
.game-venue {
  font-size: 10px;
  color: var(--muted);
  text-align: right;
  max-width: 110px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}
.scroll-btn {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--surface);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 5;
  transition: background var(--transition), border-color var(--transition);
}
.scroll-btn:hover { background: var(--card); border-color: rgba(255,255,255,0.2); }
.scroll-btn.left { left: -12px; }
.scroll-btn.right { right: -12px; }
.no-games-msg {
  text-align: center;
  padding: 32px;
  color: var(--muted);
  font-size: 14px;
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 8px;
}

/* ========== 4. FIND YOUR TEAM ========== */
.team-grid-section { }
.section-subtitle {
  font-size: 14px;
  color: var(--muted);
  margin-top: 4px;
  margin-bottom: 24px;
  font-weight: 400;
}
.divisions-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 20px;
}
.division-col {}
.division-header {
  font-size: 12px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  color: var(--muted);
  padding: 8px 0 8px 12px;
  border-left: 3px solid var(--red);
  margin-bottom: 12px;
}
.team-card-sm {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  margin-bottom: 8px;
  cursor: pointer;
  transition: transform var(--transition), border-color var(--transition), box-shadow var(--transition);
}
.team-card-sm:hover {
  transform: translateY(-1px);
  border-color: rgba(255,255,255,0.15);
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
}
.team-card-sm img {
  width: 42px; height: 42px;
  object-fit: contain;
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
  padding: 4px;
}
.team-card-info {}
.team-card-name {
  font-size: 13px;
  font-weight: 700;
}
.team-card-meta {
  font-size: 11px;
  color: var(--muted);
}

/* ========== 5. EXPLORE STATS ========== */
.stats-grid-section {}
.stats-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 12px;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  padding: 16px 14px;
  cursor: pointer;
  transition: transform var(--transition), border-color var(--transition);
  text-align: center;
}
.stat-card:hover {
  transform: translateY(-2px);
  border-color: rgba(255,255,255,0.15);
}
.stat-card.active {
  border-left: 3px solid var(--red);
  background: rgba(239,68,68,0.06);
  border-color: rgba(239,68,68,0.2);
}
.stat-emoji { font-size: 24px; margin-bottom: 6px; }
.stat-label {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 0.5px;
  color: var(--text);
}
.stat-desc {
  font-size: 10px;
  color: var(--faint);
  margin-top: 2px;
}

/* ========== 7. SPOTLIGHT + LEADERBOARD ========== */
.spotlight-section {}
.spotlight-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}
.spotlight-card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-left: 3px solid var(--red);
  border-radius: 8px;
  padding: 24px;
}
.spotlight-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 20px;
}
.spotlight-headshot {
  width: 72px; height: 72px;
  border-radius: 50%;
  object-fit: cover;
  background: rgba(255,255,255,0.05);
  border: 2px solid var(--red);
}
.spotlight-name {
  font-size: 20px;
  font-weight: 800;
}
.spotlight-meta {
  font-size: 13px;
  color: var(--muted);
}
.spotlight-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
.spotlight-stat {
  text-align: center;
  padding: 12px 8px;
  background: rgba(255,255,255,0.02);
  border-radius: 6px;
  border: 1px solid var(--card-border);
}
.spotlight-stat-val {
  font-size: 22px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  color: var(--blue);
}
.spotlight-stat-label {
  font-size: 10px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin-top: 2px;
}
.leaderboard-card {
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 8px;
  padding: 24px;
}
.leaderboard-title {
  font-size: 18px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.leaderboard-title span { color: var(--amber); }
.lb-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 0;
  border-bottom: 1px solid var(--card-border);
  cursor: pointer;
  transition: background var(--transition);
}
.lb-row:hover { background: rgba(255,255,255,0.02); }
.lb-row:last-child { border-bottom: none; }
.lb-rank {
  width: 24px;
  font-size: 13px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  text-align: center;
  color: var(--muted);
}
.lb-rank.first { color: var(--red); }
.lb-headshot {
  width: 28px; height: 28px;
  border-radius: 50%;
  object-fit: cover;
  background: rgba(255,255,255,0.05);
}
.lb-name {
  flex: 1;
  font-size: 13px;
  font-weight: 600;
}
.lb-team {
  font-size: 11px;
  color: var(--muted);
  font-weight: 500;
  width: 32px;
  text-align: center;
}
.lb-val {
  font-size: 14px;
  font-weight: 800;
  font-variant-numeric: tabular-nums;
  color: var(--blue);
  width: 50px;
  text-align: right;
}

/* ========== 8. FOOTER ========== */
.site-footer {
  margin-top: 56px;
  padding: 32px 0;
  border-top: 2px solid var(--red);
  background: var(--surface);
}
.footer-content {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.footer-copy {
  font-size: 13px;
  color: var(--muted);
}
.footer-link {
  font-size: 12px;
  color: var(--muted);
  text-decoration: none;
  transition: color var(--transition);
}
.footer-link:hover { color: var(--text); }

/* ========== LOADING ========== */
.loading-spinner {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 80px 0;
  gap: 16px;
}
.spinner {
  width: 40px; height: 40px;
  border: 3px solid var(--card-border);
  border-top-color: var(--red);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
.loading-text {
  font-size: 14px;
  color: var(--muted);
}
.error-msg {
  text-align: center;
  padding: 60px 24px;
  color: var(--muted);
}
.error-msg h3 {
  font-size: 20px;
  color: var(--text);
  margin-bottom: 8px;
}
.retry-btn {
  margin-top: 16px;
  padding: 10px 24px;
  background: var(--red);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  font-family: inherit;
  cursor: pointer;
  transition: opacity var(--transition);
}
.retry-btn:hover { opacity: 0.85; }

/* ========== PAGE LAYOUTS ========== */
.page-header {
  padding: 40px 0 24px;
}
.page-title {
  font-size: 28px;
  font-weight: 800;
  text-transform: uppercase;
  letter-spacing: 2px;
}
.page-subtitle {
  font-size: 14px;
  color: var(--muted);
  margin-top: 4px;
}
.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 600;
  color: var(--muted);
  cursor: pointer;
  padding: 8px 0;
  transition: color var(--transition);
}
.back-btn:hover { color: var(--text); }

/* ========== DATA TABLE ========== */
.data-table-wrap {
  overflow-x: auto;
  border: 1px solid var(--card-border);
  border-radius: 8px;

<body>
<div id="root"></div>
<script>
// ===========================
// BarrelVision v2 — React SPA
// ===========================
const h = React.createElement;
const { useState, useEffect, useRef, useCallback, useMemo, Fragment } = React;

// --- Constants ---
const API = './api';
const MLB_SCHEDULE = 'https://statsapi.mlb.com/api/v1/schedule?sportId=1&hydrate=linescore,team';
const LOGO_CDN = 'https://a.espncdn.com/i/teamlogos/mlb/500/scoreboard/';
const LOGO_MAP = {NYY:'nyy',BOS:'bos',TOR:'tor',TB:'tb',BAL:'bal',CLE:'cle',MIN:'min',DET:'det',CWS:'chw',KC:'kc',HOU:'hou',TEX:'tex',SEA:'sea',LAA:'laa',OAK:'oak',ATL:'atl',PHI:'phi',NYM:'nym',MIA:'mia',WSH:'wsh',MIL:'mil',CHC:'chc',STL:'stl',PIT:'pit',CIN:'cin',LAD:'lad',SD:'sd',ARI:'ari',SF:'sf',COL:'col'};
const DIVISIONS = {
  'AL East': ['NYY','BOS','TOR','TB','BAL'],
  'AL Central': ['CLE','MIN','DET','CWS','KC'],
  'AL West': ['HOU','TEX','SEA','LAA','OAK'],
  'NL East': ['ATL','PHI','NYM','MIA','WSH'],
  'NL Central': ['MIL','CHC','STL','PIT','CIN'],
  'NL West': ['LAD','SD','ARI','SF','COL'],
};
const TEAM_NAMES = {NYY:'Yankees',BOS:'Red Sox',TOR:'Blue Jays',TB:'Rays',BAL:'Orioles',CLE:'Guardians',MIN:'Twins',DET:'Tigers',CWS:'White Sox',KC:'Royals',HOU:'Astros',TEX:'Rangers',SEA:'Mariners',LAA:'Angels',OAK:'Athletics',ATL:'Braves',PHI:'Phillies',NYM:'Mets',MIA:'Marlins',WSH:'Nationals',MIL:'Brewers',CHC:'Cubs',STL:'Cardinals',PIT:'Pirates',CIN:'Reds',LAD:'Dodgers',SD:'Padres',ARI:'D-backs',SF:'Giants',COL:'Rockies'};
const PER_PAGE = 25;

function getTeamLogo(abbr) {
  var slug = LOGO_MAP[abbr] || (abbr ? abbr.toLowerCase() : 'mlb');
  return LOGO_CDN + slug + '.png';
}

function getHash() {
  return window.location.hash.slice(1) || '/';
}
function navigate(path) {
  window.location.hash = '#' + path;
}
function fmtBa(v) {
  if (v == null) return '—';
  return v < 1 ? (''+v.toFixed(3)).replace(/^0/,'') : v.toFixed(3);
}
function fmtPct(v) {
  if (v == null) return '—';
  return v.toFixed(1) + '%';
}
function fmtNum(v, dec) {
  if (v == null) return '—';
  if (dec != null) return v.toFixed(dec);
  return typeof v === 'number' ? (Number.isInteger(v) ? ''+v : v.toFixed(1)) : ''+v;
}

// --- Data Cache ---
var dataCache = {};
async function fetchJSON(url, cacheKey) {
  if (cacheKey && dataCache[cacheKey]) return dataCache[cacheKey];
  var resp = await fetch(url);
  if (!resp.ok) throw new Error('HTTP ' + resp.status);
  var data = await resp.json();
  if (cacheKey) dataCache[cacheKey] = data;
  return data;
}

// ===========================
// COMPONENTS
// ===========================

// --- Loading ---
function Loading() {
  return h('div', {className:'loading-spinner'},
    h('div', {className:'spinner'}),
    h('p', {className:'loading-text'}, 'Loading data...')
  );
}

// --- Error ---
function ErrorMsg(props) {
  return h('div', {className:'error-msg'},
    h('h3', null, 'Oops. Data struck out.'),
    h('p', null, 'Something went wrong loading the data.'),
    props.onRetry && h('button', {className:'retry-btn', onClick: props.onRetry}, 'Try Again')
  );
}

// --- Navbar ---
function Navbar() {
  var _s = useState(false), mobileOpen = _s[0], setMobileOpen = _s[1];
  var _d = useState(false), statsOpen = _d[0], setStatsOpen = _d[1];
  var hash = useHashRoute();
  var dropRef = useRef(null);

  useEffect(function() {
    function close(e) {
      if (dropRef.current && !dropRef.current.contains(e.target)) setStatsOpen(false);
    }
    document.addEventListener('click', close);
    return function() { document.removeEventListener('click', close); };
  }, []);

  useEffect(function() { setMobileOpen(false); }, [hash]);

  var funStats = [
    {emoji:'🔥', label:'Due For Tracker', path:'/leaderboard/due-for'},
    {emoji:'🍔', label:'Thicc Boy Index', path:'/leaderboard/thicc-boy'},
    {emoji:'👀', label:'Plate Discipline', path:'/leaderboard/plate-discipline'},
    {emoji:'🤕', label:'HBP Pain Index', path:'/leaderboard/hbp'},
    {emoji:'🌕', label:'Full Moon Effect', path:'/leaderboard/full-moon'},
    {emoji:'📏', label:'Size vs Power', path:'/scatter'},
  ];

  return h(Fragment, null,
    h('nav', {className:'navbar'},
      h('div', {className:'navbar-inner'},
        h('div', {className:'navbar-logo', onClick: function(){navigate('/')}},
          'BARREL', h('span', null, 'VISION')
        ),
        h('div', {className:'navbar-links'},
          h('a', {className:'nav-link' + (hash==='/' ? ' active' : ''), onClick: function(){navigate('/')}}, 'Home'),
          h('a', {className:'nav-link' + (hash.startsWith('/players') ? ' active' : ''), onClick: function(){navigate('/players')}}, 'Players'),
          h('a', {className:'nav-link' + (hash==='/compare' ? ' active' : ''), onClick: function(){navigate('/compare')}}, 'Compare'), h('a', {className:'nav-link', href:'./barrel-or-bust.html'}, 'Barrel or Bust'),
          h('div', {className:'nav-dropdown', ref: dropRef},
            h('a', {className:'nav-link' + (statsOpen ? ' active' : ''), onClick: function(e){e.stopPropagation();setStatsOpen(!statsOpen);}}, 'Stats ▾'),
            statsOpen && h('div', {className:'nav-dropdown-menu'},
              funStats.map(function(s) {
                return h('div', {key:s.path, className:'nav-dropdown-item', onClick: function(){navigate(s.path);setStatsOpen(false);}},
                  h('span', null, s.emoji), h('span', null, s.label)
                );
              })
            )
          )
        ),
        h('button', {className:'hamburger', onClick: function(){setMobileOpen(!mobileOpen)}, 'aria-label':'Menu'},
          mobileOpen ? '✕' : '☰'
        )
      )
    ),
    h('div', {className:'mobile-menu' + (mobileOpen ? ' open' : '')},
      h('div', {className:'mobile-menu-link', onClick: function(){navigate('/')}}, 'Home'),
      h('div', {className:'mobile-menu-link', onClick: function(){navigate('/players')}}, 'Players'),
      h('div', {className:'mobile-menu-link', onClick: function(){navigate('/compare')}}, 'Compare'), h('a', {className:'nav-link', href:'./barrel-or-bust.html'}, 'Barrel or Bust'),
      h('div', {className:'mobile-divider'}),
      h('div', {className:'mobile-section-label'}, 'Fun Stats'),
      funStats.map(function(s) {
        return h('div', {key:s.path, className:'mobile-menu-link', onClick: function(){navigate(s.path)}},
          s.emoji + ' ' + s.label
        );
      })
    )
  );
}

// --- useHashRoute ---
function useHashRoute() {
  var _s = useState(getHash()), route = _s[0], setRoute = _s[1];
  useEffect(function() {
    function onHash() { setRoute(getHash()); window.scrollTo(0,0); }
    window.addEventListener('hashchange', onHash);
    return function() { window.removeEventListener('hashchange', onHash); };
  }, []);
  return route;
}

// --- Footer ---
function Footer() {
  return h('footer', {className:'site-footer'},
    h('div', {className:'container footer-content'},
      h('span', {className:'footer-copy'}, 'BarrelVision \u00A9 2025 \u2014 MLB Statcast Analytics'),
      h('a', {className:'footer-link', href:'https://www.perplexity.ai/computer', target:'_blank', rel:'noopener noreferrer'}, 'Created with Perplexity Computer')
    )
  );
}

// ===========================
// HERO
// ===========================
function HeroSection(props) {
  var dash = props.dashboard;
  return h('header', {className:'hero'},
    h('div', {className:'container hero-content'},
      h('svg', {className:'hero-crosshair', viewBox:'0 0 44 44', fill:'none', xmlns:'http://www.w3.org/2000/svg'},
        h('circle', {cx:22, cy:22, r:16, stroke:'#ef4444', strokeWidth:2, opacity:0.6}),
        h('circle', {cx:22, cy:22, r:8, stroke:'#ef4444', strokeWidth:2}),
        h('circle', {cx:22, cy:22, r:2, fill:'#ef4444'}),
        h('line', {x1:22, y1:2, x2:22, y2:12, stroke:'#ef4444', strokeWidth:2}),
        h('line', {x1:22, y1:32, x2:22, y2:42, stroke:'#ef4444', strokeWidth:2}),
        h('line', {x1:2, y1:22, x2:12, y2:22, stroke:'#ef4444', strokeWidth:2}),
        h('line', {x1:32, y1:22, x2:42, y2:22, stroke:'#ef4444', strokeWidth:2})
      ),
      h('h1', {className:'hero-title'}, 'BARREL', h('span', null, 'VISION')),
      h('p', {className:'hero-tagline'}, 'Advanced Analytics. Real-Time Insight.'),
      h('p', {className:'hero-manifesto'},
        h('strong', null, 'No paywalls. No subscriptions. No bullshit.'),
        h('br'),
        'Every other site charges you $30/month for data MLB literally gives away for free. We just make it not ugly.'
      ),
      h('div', {className:'hero-kpis'},
        h('div', {className:'hero-kpi'},
          h('span', {className:'hero-kpi-value'}, dash ? dash.total_batters : '...'),
          h('span', {className:'hero-kpi-label'}, 'Players')
        ),
        h('div', {className:'hero-kpi'},
          h('span', {className:'hero-kpi-value'}, dash ? dash.total_teams : '...'),
          h('span', {className:'hero-kpi-label'}, 'Teams')
        ),
        h('div', {className:'hero-kpi'},
          h('span', {className:'hero-kpi-value'}, dash ? dash.season : '...'),
          h('span', {className:'hero-kpi-label'}, 'Season')
        ),
        h('div', {className:'hero-kpi'},
          h('span', {className:'hero-kpi-value'}, '$0'),
          h('span', {className:'hero-kpi-label'}, 'Forever')
        )
      ),
      h('a', {className:'hero-tip-btn', href:'#'}, '\uD83C\uDF7A Buy Us a Beer'),
      h('p', {className:'hero-tip-subtext'}, "Not required. We'll post anyway. We have no self-control.")
    )
  );
}

// ===========================
// TICKER
// ===========================
function TickerBar(props) {
  var batters = props.batters;
  var items = useMemo(function() {
    if (!batters || !batters.length) return [];
    var byEV = batters.slice().sort(function(a,b){return (b.avg_launch_speed||0)-(a.avg_launch_speed||0);});
    var byHR = batters.slice().sort(function(a,b){return (b.home_runs||0)-(a.home_runs||0);});
    var byBA = batters.slice().sort(function(a,b){return (b.ba||0)-(a.ba||0);});
    var out = [];
    for (var i=0; i<3 && i<byEV.length; i++) {
      var p = byEV[i];
      out.push(p.full_name.split(' ').pop().toUpperCase() + ' ' + fmtNum(p.avg_launch_speed,1) + ' mph EV');
    }
    for (var i=0; i<3 && i<byHR.length; i++) {
      var p = byHR[i];
      out.push(p.full_name.split(' ').pop().toUpperCase() + ' ' + p.home_runs + ' HR');
    }
    for (var i=0; i<3 && i<byBA.length; i++) {
      var p = byBA[i];
      out.push(p.full_name.split(' ').pop().toUpperCase() + ' ' + fmtBa(p.ba) + ' AVG');
    }
    return out;
  }, [batters]);

  if (!items.length) return null;
  var tickerContent = items.map(function(item, i) {

// ===========================
// PLAYER RADAR CHART
// ===========================
function PlayerRadarChart(props) {
  var p = props.player;
  var canvasRef = useRef(null);
  var chartRef = useRef(null);

  useEffect(function() {
    if (!canvasRef.current || !p) return;
    if (chartRef.current) chartRef.current.destroy();

    // Normalize stats to 0-100 scale for radar
    var power = Math.min(100, (p.barrel_rate || 0) * 5); // 20% barrel = 100
    var contact = Math.min(100, (p.ba || 0) * 333);       // .300 BA = ~100
    var eye = Math.min(100, Math.max(0, 100 - (p.chase_rate || 30) * 2.5)); // lower chase = higher
    var hardHit = Math.min(100, (p.hard_hit_rate || 0) * 1.8); // 55% = ~100
    var patience = Math.min(100, (p.obp || 0) * 250);     // .400 OBP = 100
    var discipline = Math.min(100, (p.plate_discipline_score || 0));

    chartRef.current = new Chart(canvasRef.current, {
      type: 'radar',
      data: {
        labels: ['Power', 'Contact', 'Eye', 'Hard Hit', 'Patience', 'Discipline'],
        datasets: [{
          label: p.full_name,
          data: [power, contact, eye, hardHit, patience, discipline],
          backgroundColor: 'rgba(227, 38, 54, 0.2)',
          borderColor: '#e32636',
          borderWidth: 2,
          pointBackgroundColor: '#e32636',
          pointBorderColor: '#fff',
          pointRadius: 4
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: true,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: function(ctx) {
                return ctx.label + ': ' + ctx.raw.toFixed(0) + '/100';
              }
            }
          }
        },
        scales: {
          r: {
            beginAtZero: true,
            max: 100,
            ticks: {
              stepSize: 25,
              color: '#8892b0',
              backdropColor: 'transparent',
              font: { size: 10 }
            },
            grid: { color: 'rgba(136,146,176,0.2)' },
            angleLines: { color: 'rgba(136,146,176,0.2)' },
            pointLabels: {
              color: '#ccd6f6',
              font: { size: 13, weight: 'bold', family: 'Inter, system-ui, sans-serif' }
            }
          }
        }
      }
    });

    return function() {
      if (chartRef.current) { chartRef.current.destroy(); chartRef.current = null; }
    };
  }, [p]);

  return h('div', {style: {maxWidth: 420, margin: '0 auto 24px', padding: '20px', background: 'rgba(10,25,47,0.6)', borderRadius: 12, border: '1px solid rgba(100,255,218,0.1)'}},
    h('canvas', {ref: canvasRef})
  );
}

  );
}

// ===========================
// SCATTER PAGE
// ===========================
function ScatterPage() {
  var _hd = useState(null), heightData = _hd[0], setHeightData = _hd[1];
  var _wd = useState(null), weightData = _wd[0], setWeightData = _wd[1];
  var _l = useState(true), loading = _l[0], setLoading = _l[1];
  var _e = useState(false), error = _e[0], setError = _e[1];
  var heightChartRef = useRef(null);
  var weightChartRef = useRef(null);
  var heightInstanceRef = useRef(null);
  var weightInstanceRef = useRef(null);

  var load = useCallback(function() {
    setLoading(true);
    setError(false);
    Promise.all([
      fetchJSON(API + '/scatter/height-hr.json', 'scatter_height'),
      fetchJSON(API + '/scatter/weight-hr.json', 'scatter_weight')
    ]).then(function(arr) {
      setHeightData(arr[0]);
      setWeightData(arr[1]);
      setLoading(false);
    }).catch(function() {
      setError(true);
      setLoading(false);
    });
  }, []);

  useEffect(function(){ load(); }, [load]);

  useEffect(function() {
    if (!heightData || !weightData) return;
    // Destroy old instances
    if (heightInstanceRef.current) { heightInstanceRef.current.destroy(); }
    if (weightInstanceRef.current) { weightInstanceRef.current.destroy(); }

    var chartOpts = {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              var p = ctx.raw;
              return p.name + ' (' + p.team + ') - ' + p.xLabel + ', ' + p.y + ' HR';
            }
          },
          backgroundColor: '#1a2439',
          titleColor: '#f1f5f9',
          bodyColor: '#94a3b8',
          borderColor: 'rgba(255,255,255,0.1)',
          borderWidth: 1
        }
      },
      scales: {
        x: {
          grid: { color: 'rgba(255,255,255,0.06)' },
          ticks: { color: '#94a3b8', font: { size: 11 } }
        },
        y: {
          grid: { color: 'rgba(255,255,255,0.06)' },
          ticks: { color: '#94a3b8', font: { size: 11 } },
          title: { display: true, text: 'Home Runs', color: '#94a3b8' }
        }
      }
    };

    // Height chart
    if (heightChartRef.current) {
      var ctx1 = heightChartRef.current.getContext('2d');
      heightInstanceRef.current = new Chart(ctx1, {
        type: 'scatter',
        data: {
          datasets: [{
            data: heightData.map(function(p) {
              return { x: p.height_inches, y: p.home_runs, name: p.full_name, team: p.team, xLabel: (p.height_display || p.height_inches + '"') };
            }),
            backgroundColor: 'rgba(239,68,68,0.6)',
            borderColor: 'rgba(239,68,68,0.8)',
            pointRadius: 4,
            pointHoverRadius: 7
          }]
        },
        options: Object.assign({}, chartOpts, {
          scales: Object.assign({}, chartOpts.scales, {
            x: Object.assign({}, chartOpts.scales.x, { title: { display: true, text: 'Height (inches)', color: '#94a3b8' } })
          })
        })
      });
    }

    // Weight chart
    if (weightChartRef.current) {
      var ctx2 = weightChartRef.current.getContext('2d');
      weightInstanceRef.current = new Chart(ctx2, {
        type: 'scatter',
        data: {
          datasets: [{
            data: weightData.map(function(p) {
              return { x: p.weight_lbs, y: p.home_runs, name: p.full_name, team: p.team, xLabel: p.weight_lbs + ' lbs' };
            }),
            backgroundColor: 'rgba(56,189,248,0.6)',
            borderColor: 'rgba(56,189,248,0.8)',
            pointRadius: 4,
            pointHoverRadius: 7
          }]
        },
        options: Object.assign({}, chartOpts, {
          scales: Object.assign({}, chartOpts.scales, {
            x: Object.assign({}, chartOpts.scales.x, { title: { display: true, text: 'Weight (lbs)', color: '#94a3b8' } })
          })
        })
      });
    }

    return function() {
      if (heightInstanceRef.current) { heightInstanceRef.current.destroy(); heightInstanceRef.current = null; }
      if (weightInstanceRef.current) { weightInstanceRef.current.destroy(); weightInstanceRef.current = null; }
    };
  }, [heightData, weightData]);

  if (loading) return h('div', {className:'container'}, h(Loading));
  if (error) return h('div', {className:'container'}, h(ErrorMsg, {onRetry: load}));

  return h('section', null,
    h('div', {className:'container'},
      h('div', {className:'back-btn', onClick: function(){navigate('/');}}, '\u2190 Home'),
      h('div', {className:'lb-page-header'},
        h('h1', {className:'lb-page-title'}, 'SIZE vs POWER \uD83D\uDCCF'),
        h('p', {className:'lb-page-subtitle'}, "Does being bigger make you hit more dingers? Let's find out.")
      ),
      h('div', {className:'scatter-container', style:{marginTop:24}},
        h('div', {className:'scatter-card'},
          h('h3', null, 'HEIGHT vs HOME RUNS'),
          h('div', {className:'scatter-canvas-wrap'},
            h('canvas', {ref: heightChartRef})
          )
        ),
        h('div', {className:'scatter-card'},
          h('h3', null, 'WEIGHT vs HOME RUNS'),
          h('div', {className:'scatter-canvas-wrap'},
            h('canvas', {ref: weightChartRef})
          )
        )
      )
    )
  );
}

// ===========================
// APP (ROOT)
// ===========================
function App() {
  var hash = useHashRoute();
  var _batters = useState(null), batters = _batters[0], setBatters = _batters[1];
  var _teams = useState(null), teams = _teams[0], setTeams = _teams[1];
  var _dash = useState(null), dashboard = _dash[0], setDashboard = _dash[1];
  var _loading = useState(true), loading = _loading[0], setLoading = _loading[1];
  var _error = useState(false), error = _error[0], setError = _error[1];

  var loadInitial = useCallback(function() {
    setLoading(true);
    setError(false);
    Promise.all([
      fetchJSON(API + '/batters.json', 'batters'),
      fetchJSON(API + '/teams.json', 'teams'),
      fetchJSON(API + '/dashboard.json', 'dashboard')
    ]).then(function(arr) {
      setBatters(arr[0]);
      setTeams(arr[1]);
      setDashboard(arr[2]);
      setLoading(false);
    }).catch(function() {
      setError(true);
      setLoading(false);
    });
  }, []);

  useEffect(function(){ loadInitial(); }, [loadInitial]);

  // Parse route
  var route = hash.split('?')[0];
  var page;
  if (route === '/' || route === '') {
    page = loading ? h(Loading) : error ? h(ErrorMsg, {onRetry: loadInitial}) : h(HomePage, {batters:batters, teams:teams, dashboard:dashboard});
  } else if (route === '/players' || route.startsWith('/players?')) {
    page = h(PlayersPage, {batters:batters, teams:teams});
  } else if (route.match(/^\/player\/(\d+)/)) {
    var playerId = route.match(/^\/player\/(\d+)/)[1];
    page = h(PlayerDetailPage, {id: playerId, key: playerId});
  } else if (route.match(/^\/team\/([A-Z]+)/)) {
    var teamAbbr = route.match(/^\/team\/([A-Z]+)/)[1];
    page = h(TeamPage, {abbrev: teamAbbr, batters: batters, key: teamAbbr});
  } else if (route === '/compare') {
    page = h(ComparePage, {batters: batters});
  } else if (route.match(/^\/leaderboard\/([\w-]+)/)) {
    var lbType = route.match(/^\/leaderboard\/([\w-]+)/)[1];
    page = h(LeaderboardPage, {type: lbType, key: lbType});
  } else if (route === '/scatter') {
    page = h(ScatterPage);
  } else {
    page = h('div', {className:'container', style:{padding:'80px 24px', textAlign:'center'}},
      h('h2', null, '404'),
      h('p', {style:{color:'var(--muted)'}}, "Page not found. Maybe it got traded."),
      h('button', {className:'retry-btn', onClick: function(){navigate('/');}}, 'Go Home')
    );
  }

  return h(Fragment, null,
    h(Navbar),
    page,
    h(Footer)
  );
}

// ===========================
// MOUNT
// ===========================
var root = ReactDOM.createRoot(document.getElementById('root'));
root.render(h(App));
</script>
