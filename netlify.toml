[build]
  publish = "."
  functions = "netlify/functions"

# Serve robots.txt directly
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

# Serve sitemap via Netlify function
[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200

# Serve API JSON files directly
[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 200

  # Serve barrel-or-bust.html directly
[[redirects]]
  from = "/barrel-or-bust.html"
  to = "/barrel-or-bust.html"
  status = 200

# SPA fallback - all other routes serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions."daily-refresh"]
  schedule = "@daily"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Access-Control-Allow-Origin = "*"
