[build]
  publish = "."
  functions = "netlify/functions"

# Serve robots.txt directly
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

  # Serve Google verification file directly
[[redirects]]
  from = "/googlecf85f8853f5fe5f9.html"
  to = "/googlecf85f8853f5fe5f9.html"
  status = 200

# Serve sitemap via Netlify function
[[redirects]]
  from = "/sitemap.xml"
  to = "/.netlify/functions/sitemap"
  status = 200

# Serve API JSON files directly
[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 200

# Serve barrel-or-bust.html directly
[[redirects]]
  from = "/barrel-or-bust.html"
  to = "/barrel-or-bust.html"
  status = 200

# SEO-aware routing for dynamic pages
[[redirects]]
  from = "/player/*"
  to = "/.netlify/functions/seo-render"
  status = 200

[[redirects]]
  from = "/team/*"
  to = "/.netlify/functions/seo-render"
  status = 200

[[redirects]]
  from = "/leaderboard/*"
  to = "/.netlify/functions/seo-render"
  status = 200

[[redirects]]
  from = "/players"
  to = "/.netlify/functions/seo-render"
  status = 200

[[redirects]]
  from = "/compare"
  to = "/.netlify/functions/seo-render"
  status = 200

[[redirects]]
  from = "/scatter"
  to = "/.netlify/functions/seo-render"
  status = 200

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[functions."daily-refresh"]
  schedule = "@daily"

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
